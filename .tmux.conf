set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

#shortcut to reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded."

# change prefix command to C-z
set -g prefix C-z
unbind C-b
bind C-z last-window
bind z send-prefix

# enable mouse support
setw -g mouse on

# Scroll History
set -g history-limit 30000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# setup | and - for window splitting
unbind %
bind | split-window -h
bind - split-window -v

# title
set -g set-titles on
set -g set-titles-string '#T'

# start window numbering at 1
set -g base-index 1

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# window status
setw -g window-status-format " #F#I:#W#F "
setw -g window-status-current-format " #F#I:#W#F "
setw -g window-status-format "#[fg=colour234]#[bg=colour240] #I #[bg=colour234]#[fg=colour240] #W "
#setw -g window-status-current-format "#[fg=colour234]#[bg=colour7] #I #[bg=colour234]#[fg=colour240] #W "
#setw -g window-status-current-style bg=colour0
#setw -g window-status-current-style fg=colour11
#setw -g window-status-current-style dim
#setw -g window-status-style bg=green
#setw -g window-status-style fg=black
setw -g window-status-style reverse

#set -g status-position bottom
#set -g status-style bg=colour233
#set -g status-style fg=colour137
#set -g status-style dim
#set -g status-left ''
set -g status-right '#[fg=colour234,bg=colour240] %d/%m #[fg=colour234,bg=colour245] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# pane border
set-option -g pane-border-style fg=colour8 #base02
set-option -g pane-active-border-style fg=colour7 #base01

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -t vi-copy v begin-selection
bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
#unbind -t vi-copy Enter
#bind-key -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy

bind-key -T copy-mode-vi Enter send-keys -X copy-pipe 'reattach-to-user-namespace pbcopy' \; send -X clear-selection

